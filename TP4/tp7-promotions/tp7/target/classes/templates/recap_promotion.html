<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title layout:fragment="title">Récapitulatif des promotions</title>
</head>
<body>

<h1 layout:fragment="headerTitle">Gestion des Promotions</h1>
<h2 layout:fragment="headerSubtitle">Récapitulatif</h2>

<div layout:fragment="content">

    <!-- Liste de toutes les promotions -->
    <section class="card">
        <h2>Liste des Promotions</h2>
        <table th:if="${not #lists.isEmpty(promotions)}">
            <thead>
                <tr>
                    <th>Identifiant</th>
                    <th>Année scolaire</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="p : ${promotions}">
                    <td th:text="${p.identifiantPromotion}"></td>
                    <td th:text="${p.anneeScolaire}"></td>
                    <td>
                        <a th:href="@{/promotions/detail(identifiant=${p.identifiantPromotion},annee=${p.anneeScolaire})}">
                            Voir
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
        <p th:if="${#lists.isEmpty(promotions)}">Aucune promotion enregistrée.</p>
    </section>

    <!-- Étudiants de la promotion sélectionnée -->
    <section class="card" th:if="${promotionSelectionnee != null}">
        <h2>Liste des étudiants de la promotion
            <span th:text="${promotionSelectionnee.identifiantPromotion}"></span>
            <span th:text="${promotionSelectionnee.anneeScolaire}"></span>
        </h2>
        <table>
            <thead>
                <tr>
                    <th>Identifiant</th>
                    <th>Nom</th>
                    <th>Prénom</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="e : ${promotionSelectionnee.etudiants}">
                    <td th:text="${e.numeroEtudiant}"></td>
                    <td th:text="${e.nom}"></td>
                    <td th:text="${e.prenom}"></td>
                </tr>
            </tbody>
        </table>
    </section>

    <p><a th:href="@{/promotions/gestion}">← Retour au formulaire</a></p>

</div>
</body>
</html>
